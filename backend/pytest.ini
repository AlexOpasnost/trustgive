[pytest]
# Point at the test settings, NOT development. Was development, which read
# DATABASE_URL from env — when invoked via `railway run pytest` that was the
# live Neon production DB and migrations failed on a duplicate-slug clash.
# `trustgive.settings.test` reads TEST_DATABASE_URL with a sane local default
# (postgres on :5433 from docker-compose.test.yml).
DJANGO_SETTINGS_MODULE = trustgive.settings.test
python_files = tests.py test_*.py *_tests.py
addopts = --reuse-db --tb=short -q
filterwarnings =
    ignore::DeprecationWarning
testpaths = apps
