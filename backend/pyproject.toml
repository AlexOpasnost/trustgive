[tool.ruff]
line-length = 100
target-version = "py313"
extend-exclude = ["migrations"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "C4", "DJ", "S", "PIE", "RUF"]
ignore = ["S101", "S105", "S106", "DJ001"]

[tool.ruff.lint.per-file-ignores]
"settings/*.py" = ["S105"]
"manage.py" = ["S603", "S607"]

[tool.mypy]
python_version = "3.13"
strict_optional = true
warn_unused_ignores = true
plugins = ["mypy_django_plugin.main"]
exclude = ["migrations/"]

[tool.django-stubs]
django_settings_module = "trustgive.settings.development"
