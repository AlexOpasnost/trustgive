name: Performance suite

on:
  schedule:
    # Weekly Sunday 03:00 UTC
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      api_url:
        description: 'API base URL to test against'
        required: false
        default: 'https://api.trustgive.org'

permissions:
  contents: read

jobs:
  k6-smoke:
    name: k6 smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run k6 smoke
        uses: grafana/setup-k6-action@v1
      - run: |
          API_BASE_URL=${{ github.event.inputs.api_url || 'https://api.trustgive.org' }} \
            k6 run performance/k6-smoke.js

  k6-load:
    name: k6 load
    runs-on: ubuntu-latest
    needs: k6-smoke
    steps:
      - uses: actions/checkout@v4
      - uses: grafana/setup-k6-action@v1
      - run: |
          API_BASE_URL=${{ github.event.inputs.api_url || 'https://api.trustgive.org' }} \
            k6 run performance/k6-load.js

  lighthouse:
    name: Lighthouse CI (frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install -g @lhci/cli
      - name: Run Lighthouse against frontend
        run: |
          cd frontend/web
          npm ci
          npm run build
          npx serve dist -p 5173 &
          sleep 3
          lhci autorun --config=../../performance/lighthouserc.json --collect.url=http://localhost:5173/
